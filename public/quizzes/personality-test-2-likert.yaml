  - { id: 11, type: likert, trait: teamwork,        text: "<p>A professor would say I was the person every group wanted on their team.</p>" }

  - { id: 12, type: likert, trait: time_management, text: "<p>A client would say I consistently delivered what I promised, on time.</p>" }
